<h2 id="多年以后老师说，这当初是我的学生夏洛"><span class="prefix"></span><span class="content"><a href=/temp.html>
<strong>多年以后老师说，这当初是我的学生夏洛</strong></a></span><span class="suffix"></span></h2>
<p>这是我跟一位老师闲聊时，老师说的一段话。在老师的眼里充满了自豪，“要是所有学生都像夏洛一样该有多好”</p>
<h2 id="一个故事看完瞬间明白了很多"><span class="prefix"></span><span class="content"><a href=/temp.html>
<strong>一个故事看完瞬间明白了很多</strong></a></span><span class="suffix"></span></h2>
<p>许多事情，该怎样，就怎样。等待它顺其自然的发生，结果会更好。可面对现实的时候，有谁又知道，事物本身该有的结果是什么样子呢？这是一个关于流浪汉的故事：”静观其变，是一种能力！顺其自然，是一种幸福“。</p>
